<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nul & Co">
  <meta name="theme-color" content="#bfe3fb">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png">
  <title>Nul &amp; Co — spelen met getallen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #bfe3fb;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    #game {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* het canvas erft touch-action niet van body → expliciet, zodat slepen
       op iOS niet als scroll/zoom wordt afgepakt */
    #game canvas { touch-action: none; -webkit-user-select: none; user-select: none; }
    /* Telefoon in landscape: het spel is portret (480×800) en wordt dan een
       postzegel. Vriendelijk vragen om te draaien. iPads (hoog scherm) blijven
       gewoon spelen dankzij de max-height-grens. */
    #rotate-hint {
      display: none; position: fixed; inset: 0; z-index: 99;
      background: #bfe3fb; color: #1f2d3a; text-align: center;
      font-family: Arial, sans-serif; font-size: 26px; font-weight: bold;
      padding-top: 26vh; line-height: 1.6;
    }
    #rotate-hint span { font-size: 56px; display: block; }
    @media (orientation: landscape) and (max-height: 500px) {
      #rotate-hint { display: block; }
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="rotate-hint"><span>📱↻</span>Draai je telefoon rechtop!</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
